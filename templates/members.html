<!DOCTYPE html>
<html>
<head>
    <title>Members</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/">Home</a> |
        <a href="/members">Members</a> |
        <a href="/about">About</a> |
        <a href="/add_member">Add Member</a> |
        <a href="/search">Search</a> |
    </nav>
    <div class="container">
    <h1>Members</h1>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Join Date</th>
            <th>Action</th>
        </tr>
        {% for member in members %}
        <tr>
            <td>2026{{ '%02d'|format(member[0]) }}</td>
            <td>{{ member[1] }}</td>
            <td>{{ member[2] }}</td>
            <td>{{ member[3] }}</td>
            <td>{{ member[4] }}</td>
            <td>{{ member[5] }}</td>
            <td><a href="/delete_member/{{ member[0] }}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
    </div>
</body>
</html>
